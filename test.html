<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billeterie des Associations</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-8 font-sans">
    <div id="app" class="max-w-6xl mx-auto">
        <h1 class="text-4xl font-extrabold text-center mb-10 text-indigo-900 tracking-tight">Découvrez nos Événements</h1>
        
        <div id="loader" class="text-center text-gray-500 py-10 font-medium">
            Chargement des événements en cours...
        </div>

        <div id="asso-list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 hidden">
            </div>

        <div id="events-section" class="mt-8 hidden">
            <button onclick="showAssos()" class="mb-6 px-4 py-2 bg-indigo-100 text-indigo-700 rounded-lg hover:bg-indigo-200 font-bold transition-colors">
                ← Retour aux associations
            </button>
            <h2 id="selected-asso-name" class="text-3xl font-bold mb-8 text-gray-800 border-b pb-2"></h2>
            
            <div id="events-list" class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                </div>
        </div>
    </div>

    <script>
        // === REMPLACEZ CETTE URL PAR CELLE DE VOTRE DEPLOIEMENT APPS SCRIPT ===
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwpJQu__uU8UC9vdSuCywqkiY09DOmzamJDofihu-qP1seUgFp2q1JokOCTDEA11GcScQ/exec";
        
        let allData = [];

        // 1. Fonction pour récupérer les données depuis le Google Script
        async function loadData() {
            try {
                const response = await fetch(APPS_SCRIPT_URL);
                if (!response.ok) throw new Error("Erreur réseau");
                
                allData = await response.json();
                document.getElementById('loader').classList.add('hidden');
                
                if (allData.erreur) {
                    alert("Erreur côté serveur : " + allData.erreur);
                } else {
                    // Au lieu de tout afficher, on vérifie d'abord l'URL
                    checkUrlAndRoute();
                }
            } catch (error) {
                document.getElementById('loader').innerText = "Impossible de charger les données. Veuillez réessayer plus tard.";
                console.error("Erreur de fetch:", error);
            }
        }

        // 2. Vérifie l'URL actuelle pour voir s'il y a un paramètre ?asso=...
        function checkUrlAndRoute() {
            const urlParams = new URLSearchParams(window.location.search);
            const assoParam = urlParams.get('asso'); // Récupère la valeur de 'asso'

            if (assoParam) {
                // On cherche l'association qui correspond au nom dans l'URL
                const index = allData.findIndex(a => a.nom_asso === assoParam);
                if (index !== -1) {
                    // Si on la trouve, on affiche ses événements (sans rajouter l'URL dans l'historique)
                    showEvents(index, false);
                    return;
                }
            }
            
            // Si pas de paramètre ou asso introuvable, on affiche la liste principale
            renderAssos();
        }

        // 3. Affichage de la grille des associations
        function renderAssos() {
            const list = document.getElementById('asso-list');
            list.classList.remove('hidden');
            
            list.innerHTML = allData.map((asso, index) => `
                <div onclick="showEvents(${index})" class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 hover:shadow-xl hover:-translate-y-1 cursor-pointer transition-all duration-300 flex flex-col items-center">
                    ${asso.logo_base64 
                        ? `<img src="${asso.logo_base64}" alt="Logo ${asso.nom_asso}" class="w-32 h-32 mb-6 object-contain rounded-full shadow-inner bg-gray-50 p-2">` 
                        : `<div class="w-32 h-32 mb-6 bg-gray-200 rounded-full flex items-center justify-center text-gray-400">Pas de logo</div>`
                    }
                    <h3 class="text-2xl font-bold text-gray-800 mb-2 text-center">${asso.nom_asso}</h3>
                    <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-indigo-50 text-indigo-700">
                        ${asso.evenements ? asso.evenements.length : 0} événement(s)
                    </span>
                </div>
            `).join('');
        }

        // 4. Affichage des événements pour une association donnée
        function showEvents(index, pushToHistory = true) {
            const asso = allData[index];
            
            // Mise à jour de l'URL si on vient du clic (et pas d'un chargement direct de lien)
            if (pushToHistory) {
                // On encode le nom de l'asso (ex: "Les Amis" devient "Les%20Amis") pour l'URL
                const newUrl = window.location.pathname + '?asso=' + encodeURIComponent(asso.nom_asso);
                window.history.pushState({ assoIndex: index }, '', newUrl);
            }

            // Masquer les assos, montrer les events
            document.getElementById('asso-list').classList.add('hidden');
            document.getElementById('events-section').classList.remove('hidden');
            document.getElementById('selected-asso-name').innerText = `Événements proposés par ${asso.nom_asso}`;

            const list = document.getElementById('events-list');
            
            if (!asso.evenements || asso.evenements.length === 0) {
                list.innerHTML = `<p class="text-gray-500 italic">Aucun événement à venir pour le moment.</p>`;
                return;
            }

            list.innerHTML = asso.evenements.map(ev => `
                <div class="bg-white rounded-2xl overflow-hidden shadow-md border border-gray-100 flex flex-col sm:flex-row hover:shadow-lg transition-shadow">
                    <div class="sm:w-2/5 h-48 sm:h-auto bg-gray-100 shrink-0">
                        ${ev.image_base64 
                            ? `<img src="${ev.image_base64}" class="w-full h-full object-cover">`
                            : `<div class="w-full h-full flex items-center justify-center text-gray-400">Image non disponible</div>`
                        }
                    </div>
                    <div class="p-6 flex-1 flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start mb-2">
                                <h4 class="text-xl font-bold text-gray-900 leading-tight">${ev.titre}</h4>
                                <span class="bg-green-100 text-green-800 text-xs font-bold px-2 py-1 rounded ml-2 whitespace-nowrap">${ev.prix} €</span>
                            </div>
                            <p class="text-sm font-medium text-indigo-600 mb-3 flex items-center gap-1">
                                📅 ${ev.date} • 🕒 ${ev.heure_debut} à ${ev.heure_fin}
                            </p>
                            <p class="text-sm text-gray-600 mb-2 font-medium">📍 ${ev.adresse}</p>
                            <p class="text-gray-700 text-sm line-clamp-3 mb-4">${ev.description}</p>
                        </div>
                        <div class="mt-4 flex items-center justify-between border-t pt-4">
                            <span class="text-sm text-gray-500">Places dispo: <strong class="text-gray-800">${ev.place}</strong></span>
                            <span class="text-sm text-gray-500">Inscrits: <strong class="text-gray-800">${ev.inscrits}</strong></span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 5. Retour à la liste principale
        function showAssos(pushToHistory = true) {
            if (pushToHistory) {
                // On nettoie l'URL (on retire le ?asso=...)
                window.history.pushState({}, '', window.location.pathname);
            }

            document.getElementById('asso-list').classList.remove('hidden');
            document.getElementById('events-section').classList.add('hidden');
        }

        // 6. Gestion du bouton "Précédent" / "Suivant" du navigateur
        window.addEventListener('popstate', () => {
            checkUrlAndRoute();
        });

        // Lancement au chargement de la page
        loadData();
    </script>
</body>
</html>
