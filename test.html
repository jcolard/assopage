<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billeterie des Associations</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4 sm:p-8 font-sans">
    <div id="app" class="max-w-5xl mx-auto">
        <h1 id="main-title" class="text-3xl sm:text-4xl font-extrabold text-center mb-10 text-indigo-900 tracking-tight cursor-pointer" onclick="showAssos()">Billeterie Associations</h1>
        
        <div id="loader" class="text-center text-gray-500 py-10 font-medium">Chargement...</div>

        <div id="asso-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 hidden"></div>

        <div id="events-section" class="mt-8 hidden">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
                <button onclick="showAssos()" class="px-4 py-2 bg-white text-gray-700 border rounded-lg hover:bg-gray-50 font-bold shadow-sm transition-all">← Retour</button>
                <button onclick="openCheckModal()" class="px-4 py-2 bg-indigo-50 text-indigo-700 rounded-lg hover:bg-indigo-100 font-bold border border-indigo-200">Voir mes inscriptions</button>
            </div>
            <h2 id="selected-asso-name" class="text-2xl font-bold mb-8 text-gray-800 border-b pb-2"></h2>
            <div id="events-list" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </div>
    </div>

    <div id="reg-modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl p-6 sm:p-8 max-w-md w-full shadow-2xl">
            <h3 class="text-xl font-bold mb-2">S'inscrire à</h3>
            <p id="m-ev-title" class="text-indigo-600 font-bold mb-6 text-lg"></p>
            <form onsubmit="doRegister(event)">
                <input type="hidden" id="m-id-sheet"> <input type="hidden" id="m-ev-id">
                <input type="hidden" id="m-ev-t"> <input type="hidden" id="m-ev-d">
                <input type="hidden" id="m-ev-h"> <input type="hidden" id="m-ev-a">
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-1">Nom Complet</label>
                    <input required id="m-nom" type="text" class="w-full p-2 border rounded-lg">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-bold mb-1">Email</label>
                    <input required id="m-email" type="email" class="w-full p-2 border rounded-lg">
                </div>
                <button id="m-btn" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700">Valider l'inscription</button>
                <p id="m-msg" class="mt-4 text-center font-bold hidden"></p>
            </form>
            <button onclick="closeModals()" class="mt-4 w-full text-gray-400 text-sm">Annuler</button>
        </div>
    </div>

    <div id="check-modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl p-6 sm:p-8 max-w-lg w-full shadow-2xl max-h-[90vh] overflow-y-auto">
            <h3 class="text-xl font-bold mb-6">Mes Inscriptions à venir</h3>
            <div id="check-form">
                <p class="text-sm mb-4 text-gray-600">Entrez votre email pour voir vos réservations dans cette association.</p>
                <div class="flex gap-2">
                    <input id="c-email" type="email" placeholder="votre@email.com" class="flex-1 p-2 border rounded-lg">
                    <button onclick="doCheck()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold">Chercher</button>
                </div>
            </div>
            <div id="check-results" class="mt-6 space-y-4 hidden"></div>
            <button onclick="closeModals()" class="mt-8 w-full text-gray-500 font-bold border-t pt-4">Fermer</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycby954cL6ebCx9BHLVIzHtEjQNOZPgs-Qh0J_u6xIcBbv1hTRQ1h0C81xZJxdXt752slXw/exec"; // <--- REMETTEZ L'URL DE LA WEB APP ICI
        let allData = [], currentAssoIndex = null, registeredEvents = new Set();

        async function loadData() {
            try {
                const r = await fetch("./associations.json?t=" + Date.now());
                allData = await r.json();
                document.getElementById('loader').classList.add('hidden');
                const urlParams = new URLSearchParams(window.location.search);
                const asso = urlParams.get('asso');
                if (asso) {
                    const idx = allData.findIndex(a => a.nom_asso === asso);
                    if (idx !== -1) return showEvents(idx, false);
                }
                renderAssos();
            } catch (e) { document.getElementById('loader').innerText = "Erreur de chargement."; }
        }

        function renderAssos() {
            const list = document.getElementById('asso-list');
            list.classList.remove('hidden');
            list.innerHTML = allData.map((asso, i) => `
                <div onclick="showEvents(${i})" class="bg-white p-6 rounded-2xl border hover:shadow-xl cursor-pointer transition-all flex flex-col items-center">
                    <img src="${asso.logo_base64 || ''}" class="w-24 h-24 mb-4 object-contain rounded-full bg-gray-50 p-2 border shadow-inner">
                    <h3 class="text-xl font-bold text-gray-800">${asso.nom_asso}</h3>
                </div>
            `).join('');
        }

        function showEvents(i, push = true) {
            currentAssoIndex = i;
            const asso = allData[i];
            if (push) window.history.pushState({}, '', '?asso=' + encodeURIComponent(asso.nom_asso));
            document.getElementById('asso-list').classList.add('hidden');
            document.getElementById('events-section').classList.remove('hidden');
            document.getElementById('selected-asso-name').innerText = asso.nom_asso;
            
            const list = document.getElementById('events-list');
            list.innerHTML = asso.evenements.map(ev => {
                // Gestion intelligente du prix pour l'affichage du bouton
                const priceLabel = (ev.prix && ev.prix !== "") ? ` • ${ev.prix}€` : '';

                return `
                <div class="bg-white rounded-xl overflow-hidden border shadow-sm flex flex-col sm:flex-row">
                    <div class="sm:w-1/3 h-40 sm:h-auto bg-gray-100">
                        <img src="${ev.image_url || ''}" class="w-full h-full object-cover">
                    </div>
                    <div class="p-4 flex-1 flex flex-col justify-between">
                        <div>
                            <h4 class="font-bold text-lg leading-tight mb-1">${ev.titre}</h4>
                            <p class="text-xs text-indigo-600 font-bold mb-2">📅 ${ev.date} • 🕒 ${ev.heure_debut}</p>
                            <p class="text-gray-600 text-sm line-clamp-2">${ev.description}</p>
                        </div>
                        <div class="mt-4 pt-4 border-t" id="btn-container-${ev.id}">
                            ${registeredEvents.has(ev.id) 
                                ? '<div class="text-center text-green-600 font-bold py-2">✓ Inscription validée</div>'
                                : `<button onclick="openRegModal('${asso.id_sheet}', '${ev.id}', '${ev.titre.replace(/'/g, "\\'")}', '${ev.date}', '${ev.heure_debut}', '${ev.adresse.replace(/'/g, "\\'")}')" class="w-full bg-indigo-600 text-white font-bold py-2 rounded-lg">S'inscrire${priceLabel}</button>`
                            }
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function openRegModal(sh, id, t, d, h, a) {
            document.getElementById('m-id-sheet').value = sh; document.getElementById('m-ev-id').value = id;
            document.getElementById('m-ev-t').value = t; document.getElementById('m-ev-d').value = d;
            document.getElementById('m-ev-h').value = h; document.getElementById('m-ev-a').value = a;
            document.getElementById('m-ev-title').innerText = t;
            
            // --- CORRECTION : Réinitialisation complète de la modale ---
            document.getElementById('m-nom').value = "";
            document.getElementById('m-email').value = "";
            const btn = document.getElementById('m-btn');
            btn.disabled = false;
            btn.innerText = "Valider l'inscription";
            const msg = document.getElementById('m-msg');
            msg.classList.add('hidden');
            msg.innerText = "";
            // -----------------------------------------------------------

            document.getElementById('reg-modal').classList.remove('hidden');
        }

        async function doRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('m-btn'), msg = document.getElementById('m-msg'), evId = document.getElementById('m-ev-id').value;
            btn.disabled = true; btn.innerText = "Traitement...";
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({
                    action: 'register', id_sheet: document.getElementById('m-id-sheet').value,
                    evenement_id: evId, user_nom: document.getElementById('m-nom').value,
                    user_email: document.getElementById('m-email').value, ev_titre: document.getElementById('m-ev-t').value,
                    ev_date: document.getElementById('m-ev-d').value, ev_heure: document.getElementById('m-ev-h').value,
                    ev_adresse: document.getElementById('m-ev-a').value
                })});
                const r = await res.json();
                if (r.success) {
                    msg.className = "mt-4 text-center text-green-600 font-bold";
                    msg.innerText = r.message; msg.classList.remove('hidden');
                    registeredEvents.add(evId);
                    document.getElementById('btn-container-' + evId).innerHTML = '<div class="text-center text-green-600 font-bold py-2">✓ Inscription validée</div>';
                    setTimeout(closeModals, 1500);
                }
            } catch (err) { btn.disabled = false; btn.innerText = "Erreur, réessayer"; }
        }

        function openCheckModal() { document.getElementById('check-modal').classList.remove('hidden'); }
        
        async function doCheck() {
            const email = document.getElementById('c-email').value, resDiv = document.getElementById('check-results');
            if (!email) return;
            resDiv.innerHTML = "Recherche..."; resDiv.classList.remove('hidden');
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({
                    action: 'check', id_sheet: allData[currentAssoIndex].id_sheet, user_email: email
                })});
                const r = await res.json();
                if (r.data.length === 0) resDiv.innerHTML = "<p class='text-gray-400 italic'>Aucune inscription trouvée.</p>";
                else resDiv.innerHTML = r.data.map(i => `
                    <div class="p-3 border-l-4 border-indigo-500 bg-gray-50 rounded-r-lg">
                        <p class="font-bold text-gray-800">${i.titre}</p>
                        <p class="text-xs text-gray-500">📅 ${i.date} à ${i.heure}</p>
                    </div>
                `).join('');
            } catch(e) { resDiv.innerHTML = "Erreur."; }
        }

        function closeModals() {
            document.querySelectorAll('#reg-modal, #check-modal').forEach(m => m.classList.add('hidden'));
            document.getElementById('check-results').classList.add('hidden');
            document.getElementById('c-email').value = "";
        }

        function showAssos() {
            window.history.pushState({}, '', window.location.pathname);
            document.getElementById('asso-list').classList.remove('hidden');
            document.getElementById('events-section').classList.add('hidden');
        }

        loadData();
    </script>
</body>
</html>
