<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billeterie des Associations</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-8 font-sans relative">
    <div id="app" class="max-w-6xl mx-auto">
        <h1 class="text-4xl font-extrabold text-center mb-10 text-indigo-900 tracking-tight">Découvrez nos Événements</h1>
        
        <div id="loader" class="text-center text-gray-500 py-10 font-medium">
            Chargement des événements en cours...
        </div>

        <div id="asso-list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 hidden">
            </div>

        <div id="events-section" class="mt-8 hidden">
            <button onclick="showAssos()" class="mb-6 px-4 py-2 bg-indigo-100 text-indigo-700 rounded-lg hover:bg-indigo-200 font-bold transition-colors">
                ← Retour aux associations
            </button>
            <h2 id="selected-asso-name" class="text-3xl font-bold mb-8 text-gray-800 border-b pb-2"></h2>
            
            <div id="events-list" class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                </div>
        </div>
    </div>

    <div id="registration-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl p-8 max-w-md w-full mx-4 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold text-gray-900">S'inscrire</h3>
                <button onclick="closeModal()" class="text-gray-500 hover:text-gray-700 text-2xl font-bold">&times;</button>
            </div>
            
            <p id="modal-event-title" class="text-indigo-600 font-medium mb-6"></p>

            <form id="registration-form" onsubmit="handleRegistration(event)">
                <input type="hidden" id="reg-asso-name">
                <input type="hidden" id="reg-event-id">
                
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="nom">Nom et Prénom</label>
                    <input required type="text" id="reg-nom" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500" placeholder="Jean Dupont">
                </div>
                
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="email">Adresse E-mail</label>
                    <input required type="email" id="reg-email" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500" placeholder="jean.dupont@email.com">
                </div>
                
                <button type="submit" id="reg-submit-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg transition-colors">
                    Confirmer l'inscription
                </button>
                <p id="reg-message" class="mt-4 text-center text-sm font-bold hidden"></p>
            </form>
        </div>
    </div>

    <script>
        const DATA_URL = "./associations.json";
        // === REMPLACEZ PAR L'URL DE VOTRE NOUVELLE WEB APP (doPost) ===
        const INSCRIPTION_API_URL = "URL_DE_LA_NOUVELLE_WEB_APP_INSCRIPTION"; 
        
        let allData = [];

        async function loadData() {
            try {
                const response = await fetch(DATA_URL + "?t=" + new Date().getTime());
                if (!response.ok) throw new Error("Fichier introuvable");
                
                allData = await response.json();
                document.getElementById('loader').classList.add('hidden');
                
                if (allData.erreur) {
                    alert("Erreur serveur : " + allData.erreur);
                } else {
                    checkUrlAndRoute();
                }
            } catch (error) {
                document.getElementById('loader').innerText = "Impossible de charger les données.";
            }
        }

        function checkUrlAndRoute() {
            const urlParams = new URLSearchParams(window.location.search);
            const assoParam = urlParams.get('asso');

            if (assoParam) {
                const index = allData.findIndex(a => a.nom_asso === assoParam);
                if (index !== -1) {
                    showEvents(index, false);
                    return;
                }
            }
            renderAssos();
        }

        function renderAssos() {
            const list = document.getElementById('asso-list');
            list.classList.remove('hidden');
            
            list.innerHTML = allData.map((asso, index) => `
                <div onclick="showEvents(${index})" class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 hover:shadow-xl hover:-translate-y-1 cursor-pointer transition-all duration-300 flex flex-col items-center">
                    ${asso.logo_base64 
                        ? `<img src="${asso.logo_base64}" alt="Logo ${asso.nom_asso}" class="w-32 h-32 mb-6 object-contain rounded-full shadow-inner bg-gray-50 p-2">` 
                        : `<div class="w-32 h-32 mb-6 bg-gray-200 rounded-full flex items-center justify-center text-gray-400">Pas de logo</div>`
                    }
                    <h3 class="text-2xl font-bold text-gray-800 mb-2 text-center">${asso.nom_asso}</h3>
                    <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-indigo-50 text-indigo-700">
                        ${asso.evenements ? asso.evenements.length : 0} événement(s)
                    </span>
                </div>
            `).join('');
        }

        function showEvents(index, pushToHistory = true) {
            const asso = allData[index];
            
            if (pushToHistory) {
                const newUrl = window.location.pathname + '?asso=' + encodeURIComponent(asso.nom_asso);
                window.history.pushState({ assoIndex: index }, '', newUrl);
            }

            document.getElementById('asso-list').classList.add('hidden');
            document.getElementById('events-section').classList.remove('hidden');
            document.getElementById('selected-asso-name').innerText = `Événements proposés par ${asso.nom_asso}`;

            const list = document.getElementById('events-list');
            
            if (!asso.evenements || asso.evenements.length === 0) {
                list.innerHTML = `<p class="text-gray-500 italic">Aucun événement à venir.</p>`;
                return;
            }

            // On utilise des apostrophes échappées pour éviter de casser le JSON lors du passage dans onclick
            list.innerHTML = asso.evenements.map(ev => {
                const isFull = parseInt(ev.inscrits) >= parseInt(ev.place);
                
                return `
                <div class="bg-white rounded-2xl overflow-hidden shadow-md border border-gray-100 flex flex-col sm:flex-row hover:shadow-lg transition-shadow">
                    <div class="sm:w-2/5 h-48 sm:h-auto bg-gray-100 shrink-0">
                        ${ev.image_url 
                            ? `<img src="${ev.image_url}" class="w-full h-full object-cover" loading="lazy">`
                            : `<div class="w-full h-full flex items-center justify-center text-gray-400">Image non dispo</div>`
                        }
                    </div>
                    <div class="p-6 flex-1 flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start mb-2">
                                <h4 class="text-xl font-bold text-gray-900 leading-tight">${ev.titre}</h4>
                                <span class="bg-green-100 text-green-800 text-xs font-bold px-2 py-1 rounded ml-2 whitespace-nowrap">${ev.prix} €</span>
                            </div>
                            <p class="text-sm font-medium text-indigo-600 mb-3 flex items-center gap-1">
                                📅 ${ev.date} • 🕒 ${ev.heure_debut} à ${ev.heure_fin}
                            </p>
                            <p class="text-sm text-gray-600 mb-2 font-medium">📍 ${ev.adresse}</p>
                            <p class="text-gray-700 text-sm line-clamp-2 mb-4">${ev.description}</p>
                        </div>
                        
                        <div class="mt-auto border-t pt-4">
                            <div class="flex items-center justify-between mb-3">
                                <span class="text-sm text-gray-500">Places dispo: <strong class="text-gray-800">${ev.place}</strong></span>
                                <span class="text-sm text-gray-500">Inscrits: <strong class="text-gray-800">${ev.inscrits}</strong></span>
                            </div>
                            
                            ${isFull 
                                ? `<button disabled class="w-full bg-gray-300 text-gray-600 font-bold py-2 px-4 rounded-lg cursor-not-allowed">Complet</button>`
                                : `<button onclick="openModal('${asso.nom_asso.replace(/'/g, "\\'")}', '${ev.id}', '${ev.titre.replace(/'/g, "\\'")}')" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-lg transition-colors">S'inscrire</button>`
                            }
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function showAssos(pushToHistory = true) {
            if (pushToHistory) window.history.pushState({}, '', window.location.pathname);
            document.getElementById('asso-list').classList.remove('hidden');
            document.getElementById('events-section').classList.add('hidden');
        }

        // --- GESTION DE LA MODALE ET DE L'INSCRIPTION ---

        function openModal(assoName, eventId, eventTitle) {
            document.getElementById('reg-asso-name').value = assoName;
            document.getElementById('reg-event-id').value = eventId;
            document.getElementById('modal-event-title').innerText = eventTitle;
            
            // Réinitialiser le formulaire
            document.getElementById('registration-form').reset();
            const msgEl = document.getElementById('reg-message');
            msgEl.classList.add('hidden');
            msgEl.innerText = '';
            document.getElementById('reg-submit-btn').disabled = false;
            document.getElementById('reg-submit-btn').innerText = "Confirmer l'inscription";

            document.getElementById('registration-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('registration-modal').classList.add('hidden');
        }

        async function handleRegistration(e) {
            e.preventDefault(); // Empêche le rechargement de la page
            
            const btn = document.getElementById('reg-submit-btn');
            const msgEl = document.getElementById('reg-message');
            
            const payload = {
                nom_asso: document.getElementById('reg-asso-name').value,
                evenement_id: document.getElementById('reg-event-id').value,
                user_nom: document.getElementById('reg-nom').value,
                user_email: document.getElementById('reg-email').value
            };

            // État de chargement
            btn.disabled = true;
            btn.innerText = "Inscription en cours...";
            msgEl.classList.add('hidden');

            try {
                // Requête POST vers la Web App Apps Script
                const response = await fetch(INSCRIPTION_API_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();

                msgEl.classList.remove('hidden');
                if (result.success) {
                    msgEl.className = "mt-4 text-center text-sm font-bold text-green-600";
                    msgEl.innerText = result.message;
                    btn.innerText = "Inscrit !";
                    // Optionnel : fermer la modale automatiquement après 2 secondes
                    setTimeout(closeModal, 2000);
                } else {
                    msgEl.className = "mt-4 text-center text-sm font-bold text-red-600";
                    msgEl.innerText = result.message;
                    btn.disabled = false;
                    btn.innerText = "Réessayer";
                }
            } catch (error) {
                msgEl.classList.remove('hidden');
                msgEl.className = "mt-4 text-center text-sm font-bold text-red-600";
                msgEl.innerText = "Erreur de connexion au serveur.";
                btn.disabled = false;
                btn.innerText = "Réessayer";
            }
        }

        window.addEventListener('popstate', () => { checkUrlAndRoute(); });
        loadData();
    </script>
</body>
</html>
