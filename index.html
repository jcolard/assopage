<!DOCTYPE html>
<html lang="fr-FR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assopage - Site en travaux</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Roboto+Condensed:wght@300;400;700&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        :root {
            --yellow: #fdf987;
            --black: #0a0a0a;
            --white: #ffffff;
            --grey-light: #f5f5f5;
            --text-grey: #4a4a4a;
            --font-title: 'Oswald', sans-serif;
            --font-body: 'Roboto Condensed', sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: var(--font-body);
            color: var(--black);
            background: var(--black);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Réutilisation de ton style Hero pour le fond */
        .maintenance-container {
            flex: 1;
            background-image: url('le fond.png');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            text-align: center;
            padding: 20px;
        }

        /* Overlay pour assurer la lisibilité */
        .maintenance-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            max-width: 600px;
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin-bottom: 20px;
            display: block;
        }
        .logo .asso { color: var(--white); }
        .logo .page { color: var(--yellow); }

        h1 {
            font-family: var(--font-title);
            color: var(--white);
            font-size: clamp(2rem, 5vw, 3.5rem);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 15px;
        }

        .separator-small {
            width: 80px;
            height: 4px;
            background-color: var(--yellow);
            margin: 0 auto 30px auto;
        }

        p {
            color: var(--white);
            font-family: var(--font-title);
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 1px;
        }

        footer {
            background-color: var(--black);
            color: #666;
            padding: 20px;
            text-align: center;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="maintenance-container">
        <div class="content">
            <div class="logo">
                <span class="asso">ASSO</span><span class="page">PAGE</span>
            </div>
            
            <h1>Site en travaux</h1>
            <div class="separator-small"></div>
            <p>On peaufine les réglages, on revient très vite.</p>
        </div>
    </div>

    <footer>
        © 2026 Assopage par Jérémy Colard.
    </footer>

</body>
</html>
